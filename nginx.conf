server {
    listen 80;
    server_name your-domain.com;   # 替换为你的域名或 ECS 公网 IP

    root /var/www/myblog;
    index index.html;

    # Next.js SSG + trailingSlash:true 的路由规则
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 图片等静态资源缓存 30 天
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问隐藏文件（如 .git）
    location ~ /\. {
        deny all;
    }
}
